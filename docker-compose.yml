version: '3.8'

services:
  backend:
    build:
      context: ./myapp
    ports:
      - "8080:8080"
    env_file:
      - ./myapp/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend
